<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Image Detector — Forensic Analysis</title>
    <link rel="icon" type="image/jpeg" href="/static/favicon.jpg">
    <!-- Google Fonts: Inter and IBM Plex Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Background Glowing Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="app-layout">
        <!-- Sidebar Control Panel -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="header-mark">◆</span>
                <h1 class="page-title">CONFIGS</h1>
            </div>
            
            <hr class="sidebar-divider">

            <!-- Theme Toggle -->
            <div class="control-group">
                <label class="control-label">THEME MODE</label>
                <button type="button" id="theme-toggle-btn" class="theme-toggle-button">
                    <span class="theme-icon">☀</span>
                    <span class="theme-text">LIGHT MODE</span>
                </button>
            </div>

            <!-- Model Selection Dropdown -->
            <div class="control-group">
                <label class="control-label">MODELS</label>
                <div class="custom-dropdown" id="custom-dropdown">
                    <div class="dropdown-trigger" id="dropdown-trigger">
                        <span id="selected-model-name">cnn_model_v1.pt</span>
                        <span class="dropdown-arrow">▾</span>
                    </div>
                    <div class="dropdown-menu" id="dropdown-menu">
                        <!-- Dynamic Options -->
                    </div>
                </div>
            </div>

            <!-- Model Info Metrics -->
            <div class="control-group model-info-card">
                <label class="control-label">MODEL SPECIFICATION</label>
                <div class="spec-row">
                    <span class="spec-label">Pipeline:</span>
                    <span id="spec-pipeline" class="spec-value">-</span>
                </div>
                <div class="spec-row">
                    <span class="spec-label">Type:</span>
                    <span id="spec-type" class="spec-value">-</span>
                </div>
                <div class="spec-row">
                    <span class="spec-label">Train Acc:</span>
                    <span id="spec-train-acc" class="spec-value">-</span>
                </div>
                <div class="spec-row">
                    <span class="spec-label">Test Acc:</span>
                    <span id="spec-test-acc" class="spec-value">-</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <section class="main-content">
            <header class="content-header">
                <h2 class="content-title">DEEPFAKE IMAGE DETECTION</h2>
                <span class="version-chip" id="model-version-chip">cnn_model_v1.pt</span>
            </header>

            <div class="main-card">
                <!-- Upload Drop Zone -->
                <div id="drop-zone" class="upload-zone">
                    <input type="file" id="file-input" accept=".jpg,.jpeg,.png" style="display: none;">
                    <p id="upload-prompt">Drop image here or <span class="browse-link">click to browse</span></p>
                    <div id="preview-container" class="preview-container" style="display: none;">
                        <div class="image-wrapper">
                            <img id="image-preview" src="" alt="Uploaded image preview">
                            <canvas id="scan-canvas"></canvas>
                        </div>
                        <button type="button" id="reset-btn" class="reset-button">[ CLEAR IMAGE ]</button>
                    </div>
                </div>

                <!-- Scan Button -->
                <button type="button" id="scan-btn" class="scan-button" disabled>SCAN IMAGE</button>
                
                <!-- Progress Indicator -->
                <div id="scan-progress" class="progress-bar" style="display: none;">
                    <div class="progress-line"></div>
                </div>

                <!-- Error Banner -->
                <div id="error-banner" class="error-banner" style="display: none;">
                    <p id="error-text"></p>
                </div>
            </div>

            <!-- Result Panel -->
            <section id="results-panel" class="results-panel" style="display: none;">
                <h2 class="section-label">ANALYSIS METRICS</h2>
                
                <div class="verdict-card">
                    <div class="verdict-header">
                        <span id="verdict-text" class="verdict-word">FAKE</span>
                        <span id="verdict-confidence" class="verdict-percentage">94.2%</span>
                    </div>
                    
                    <div class="model-breakdown">
                        <div class="metric-row">
                            <span class="model-name" id="cnn-model-name-label">CNN Pipeline</span>
                            <span id="val-cnn" class="model-score">-</span>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
